name: Build Croptix on Update

on:
  schedule:
    - cron: "0 0 * * *"   # daily
  workflow_dispatch:      # manual trigger

permissions:
  contents: write

jobs:
  check-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Get latest commit from Croptix
        id: latest
        run: |
          git ls-remote https://github.com/stratumadev/croptix HEAD | cut -f1 > latest.txt
          echo "latest=$(cat latest.txt)" >> $GITHUB_OUTPUT

      - name: Load previous commit
        id: cache
        run: |
          if [ -f last_commit.txt ]; then
            echo "last=$(cat last_commit.txt)" >> $GITHUB_OUTPUT
          else
            echo "last=none" >> $GITHUB_OUTPUT
          fi

      - name: Compare commits
        id: compare
        run: |
          if [ "${{ steps.latest.outputs.latest }}" != "${{ steps.cache.outputs.last }}" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Save latest commit
        if: steps.compare.outputs.changed == 'true'
        run: echo "${{ steps.latest.outputs.latest }}" > last_commit.txt

      - name: Commit state
        if: steps.compare.outputs.changed == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add last_commit.txt
          git commit -m "update last commit" || echo "no changes"
          git push

      - name: Clone Croptix
        if: steps.compare.outputs.changed == 'true'
        run: git clone https://github.com/stratumadev/croptix.git croptix

      - name: Setup Bun
        if: steps.compare.outputs.changed == 'true'
        uses: oven-sh/setup-bun@v1

      - name: Install dependencies
        if: steps.compare.outputs.changed == 'true'
        working-directory: croptix
        run: bun install

      - name: Build project
        if: steps.compare.outputs.changed == 'true'
        working-directory: croptix
        run: bun run build:v2

      # ✅ FIXED: correct folder
      - name: Find ZIP in build folder
        if: steps.compare.outputs.changed == 'true'
        id: findzip
        run: |
          FILE=$(find croptix/build -name "*.zip" | head -n 1)
          echo "Found ZIP: $FILE"
          echo "zipfile=$FILE" >> $GITHUB_OUTPUT

      # ✅ safety check
      - name: Fail if ZIP not found
        if: steps.compare.outputs.changed == 'true'
        run: |
          if [ -z "${{ steps.findzip.outputs.zipfile }}" ]; then
            echo "No ZIP file found!"
            exit 1
          fi

      - name: Create Release and upload ZIP
        if: steps.compare.outputs.changed == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: build-${{ steps.latest.outputs.latest }}
          name: Auto Build ${{ steps.latest.outputs.latest }}
          files: ${{ steps.findzip.outputs.zipfile }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
